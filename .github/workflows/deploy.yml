name: Deploy Website

on:
  push:
    branches: ["main", "Dev"] # или "master", если твоя главная ветка называется так

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # указывает, что деплоить нужно весь корень проекта

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4